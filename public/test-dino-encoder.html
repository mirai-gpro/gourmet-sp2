<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dino_encoder.onnx Python vs TypeScript Comparison</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .section {
            background: #16213e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .section h3 {
            margin-top: 0;
            color: #4ecca3;
        }
        .error { color: #ff6b6b; }
        .success { color: #4ecca3; }
        .warning { color: #ffd93d; }
        pre {
            background: #0f0f23;
            padding: 10px;
            overflow-x: auto;
            border-radius: 4px;
        }
        button {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px;
        }
        button:hover {
            background: #3db892;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #log {
            max-height: 600px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 dino_encoder.onnx Comparison Test</h1>
    <p>Compare Python ONNX Runtime vs TypeScript ONNX Runtime Web output</p>
    
    <div class="section">
        <h3>Controls</h3>
        <button id="runTest" onclick="runTest()">Run Comparison Test</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div class="section">
        <h3>Results</h3>
        <div id="log"><pre>Click "Run Comparison Test" to start...</pre></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
    <script>
        let logDiv = document.getElementById('log');
        
        function log(msg, type = 'info') {
            const color = type === 'error' ? '#ff6b6b' : 
                          type === 'success' ? '#4ecca3' : 
                          type === 'warning' ? '#ffd93d' : '#eee';
            logDiv.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            logDiv.innerHTML = '<pre>';
        }
        
        function getStats(arr) {
            let min = Infinity, max = -Infinity, sum = 0, nanCount = 0;
            const sampleSet = new Set();
            
            for (let i = 0; i < arr.length; i++) {
                const v = arr[i];
                if (isNaN(v)) { nanCount++; continue; }
                if (v < min) min = v;
                if (v > max) max = v;
                sum += v;
                if (i % 100 === 0) sampleSet.add(v.toFixed(6));
            }
            
            return {
                min: min.toFixed(4),
                max: max.toFixed(4),
                mean: (sum / arr.length).toFixed(4),
                nanCount,
                uniqueApprox: sampleSet.size
            };
        }
        
        async function runTest() {
            const btn = document.getElementById('runTest');
            btn.disabled = true;
            clearLog();
            
            try {
                log('=' .repeat(60));
                log('🧪 dino_encoder.onnx Python vs TypeScript Comparison');
                log('=' .repeat(60));
                
                // 1. Load test input
                log('\n[1/5] Loading test input (test_input.bin)...');
                const inputResp = await fetch('/assets/test_input.bin');
                if (!inputResp.ok) throw new Error('Failed to load test_input.bin - did you copy it to public/assets/?');
                const inputBuffer = await inputResp.arrayBuffer();
                const inputData = new Float32Array(inputBuffer);
                
                log(`  ✅ Loaded: ${inputData.length} floats`);
                log(`  Expected: ${1 * 768 * 37 * 37} = ${1 * 768 * 37 * 37} floats`);
                
                const inputStats = getStats(inputData);
                log(`  Range: [${inputStats.min}, ${inputStats.max}]`);
                log(`  Sample[0..4]: [${Array.from(inputData.slice(0, 5)).map(v => v.toFixed(4)).join(', ')}]`);
                
                // Verify input matches Python
                const expectedSample = [0.4967, -0.1383, 0.6477, 1.5230, -0.2342];
                let inputMatch = true;
                for (let i = 0; i < 5; i++) {
                    if (Math.abs(inputData[i] - expectedSample[i]) > 0.001) {
                        inputMatch = false;
                        break;
                    }
                }
                if (inputMatch) {
                    log('  ✅ Input matches Python seed(42) data', 'success');
                } else {
                    log('  ⚠️ Input does NOT match Python seed(42) data!', 'warning');
                }
                
                // 2. Load Python output for comparison
                log('\n[2/5] Loading Python output (python_output.bin)...');
                const pyOutResp = await fetch('/assets/python_output.bin');
                if (!pyOutResp.ok) throw new Error('Failed to load python_output.bin - did you copy it to public/assets/?');
                const pyOutBuffer = await pyOutResp.arrayBuffer();
                const pythonOutput = new Float32Array(pyOutBuffer);
                
                log(`  ✅ Loaded: ${pythonOutput.length} floats`);
                log(`  Expected: ${1 * 128 * 518 * 518} = ${1 * 128 * 518 * 518} floats`);
                
                const pyStats = getStats(pythonOutput);
                log(`  Range: [${pyStats.min}, ${pyStats.max}]`);
                log(`  Sample[0..9]: [${Array.from(pythonOutput.slice(0, 10)).map(v => v.toFixed(4)).join(', ')}]`);
                
                // 3. Load ONNX model
                log('\n[3/5] Loading dino_encoder.onnx...');
                ort.env.wasm.numThreads = 1;
                ort.env.wasm.simd = true;
                
                const session = await ort.InferenceSession.create('/assets/dino_encoder.onnx', {
                    executionProviders: ['wasm']
                });
                log('  ✅ Model loaded');
                log(`  Inputs: ${session.inputNames}`);
                log(`  Outputs: ${session.outputNames}`);
                
                // 4. Run inference
                log('\n[4/5] Running TypeScript ONNX inference...');
                const inputTensor = new ort.Tensor('float32', inputData, [1, 768, 37, 37]);
                
                const startTime = performance.now();
                const results = await session.run({ 'dinov2_features': inputTensor });
                const endTime = performance.now();
                
                const tsOutput = results[session.outputNames[0]].data;
                const tsDims = results[session.outputNames[0]].dims;
                
                log(`  ✅ Inference complete in ${(endTime - startTime).toFixed(0)}ms`);
                log(`  Output shape: [${tsDims.join(', ')}]`);
                
                const tsStats = getStats(tsOutput);
                log(`  Range: [${tsStats.min}, ${tsStats.max}]`);
                log(`  Sample[0..9]: [${Array.from(tsOutput.slice(0, 10)).map(v => v.toFixed(4)).join(', ')}]`);
                log(`  Unique approx: ${tsStats.uniqueApprox}`);
                
                // 5. Compare outputs
                log('\n[5/5] Comparing Python vs TypeScript outputs...');
                log('=' .repeat(60));
                
                log('\n📊 COMPARISON RESULTS:');
                log('-'.repeat(40));
                log(`                    Python          TypeScript`);
                log(`  Range min:        ${pyStats.min}          ${tsStats.min}`);
                log(`  Range max:        ${pyStats.max}           ${tsStats.max}`);
                log(`  Mean:             ${pyStats.mean}          ${tsStats.mean}`);
                log(`  Unique (approx):  26846464        ${tsStats.uniqueApprox * 100} (sampled)`);
                
                // Calculate difference
                let maxDiff = 0;
                let sumDiff = 0;
                let diffCount = 0;
                
                const checkCount = Math.min(pythonOutput.length, tsOutput.length);
                for (let i = 0; i < checkCount; i++) {
                    const diff = Math.abs(pythonOutput[i] - tsOutput[i]);
                    if (diff > maxDiff) maxDiff = diff;
                    sumDiff += diff;
                    if (diff > 0.01) diffCount++;
                }
                
                const avgDiff = sumDiff / checkCount;
                
                log('\n📈 DIFFERENCE ANALYSIS:');
                log('-'.repeat(40));
                log(`  Max absolute diff:     ${maxDiff.toFixed(6)}`);
                log(`  Average absolute diff: ${avgDiff.toFixed(6)}`);
                log(`  Values with diff>0.01: ${diffCount} / ${checkCount} (${(diffCount/checkCount*100).toFixed(2)}%)`);
                
                // Sample comparison
                log('\n📝 SAMPLE VALUE COMPARISON (first 10):');
                log('-'.repeat(40));
                log('  Index     Python          TypeScript      Diff');
                for (let i = 0; i < 10; i++) {
                    const py = pythonOutput[i];
                    const ts = tsOutput[i];
                    const diff = Math.abs(py - ts);
                    const diffStr = diff > 0.01 ? `⚠️ ${diff.toFixed(6)}` : `✅ ${diff.toFixed(6)}`;
                    log(`  [${i}]      ${py.toFixed(6)}       ${ts.toFixed(6)}       ${diffStr}`);
                }
                
                // Final verdict
                log('\n' + '=' .repeat(60));
                if (maxDiff < 0.001) {
                    log('✅ VERDICT: Outputs are IDENTICAL (diff < 0.001)', 'success');
                } else if (maxDiff < 0.1) {
                    log('⚠️ VERDICT: Outputs have SMALL differences (diff < 0.1)', 'warning');
                    log('   This may be due to floating point precision differences', 'warning');
                } else {
                    log('❌ VERDICT: Outputs are DIFFERENT!', 'error');
                    log('   ONNX Runtime Web is producing different results than Python', 'error');
                    log('   This is likely the root cause of the rendering issues', 'error');
                }
                log('=' .repeat(60));
                
            } catch (error) {
                log(`\n❌ ERROR: ${error.message}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
